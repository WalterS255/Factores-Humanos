spring.application.name=tprints-backend

server.port=${PORT:8080}

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/tprints}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=${JWT_SECRET:VGhpc0lzQVRwcmludHNTZWNyZXRLZXlGb3JEZXZlbG9wbWVudDEyMzQ1Njc4OTA=}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}